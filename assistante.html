<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NéoSuite - Gestion Médicale Complète</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.3s, color 0.3s;
    }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #F5F9FF;
      --text-primary: #1A3B54;
      --text-secondary: #2B4F6E;
      --border-color: #A0B8CC;
      --accent-color: #FF9800;
      --accent-hover: #F57C00;
      --danger: #D32F2F;
      --success: #4CAF50;
      --warning: #F57C00;
      --info: #0288D1;
      --header-bg: #1A3B54;
      --sidebar-bg: #E8F0F8;
    }

    body.dark-mode {
      --bg-primary: #1A1E2B;
      --bg-secondary: #2D3349;
      --text-primary: #ffffff;
      --text-secondary: #E8F0F8;
      --border-color: #4A5568;
      --accent-color: #FFB74D;
      --header-bg: #0F172A;
      --sidebar-bg: #2D3748;
    }

    body {
      background: #2B4F6E;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    /* Layout principal */
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }

    /* ===== SIDEBAR PRINCIPALE ===== */
    .main-sidebar {
      background: var(--bg-primary);
      border: 2px solid var(--border-color);
      border-radius: 20px;
      padding: 20px;
      height: fit-content;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 3px solid var(--accent-color);
    }

    .sidebar-header h3 {
      color: var(--text-primary);
      font-size: 1.3rem;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px;
      margin-bottom: 5px;
      border-radius: 15px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .menu-item i {
      width: 25px;
      color: var(--accent-color);
      font-size: 1.2rem;
    }

    .menu-item:hover {
      background: var(--sidebar-bg);
    }

    .menu-item.active {
      background: var(--accent-color);
      color: white;
    }

    .menu-item.active i {
      color: white;
    }

    .menu-item .badge {
      margin-left: auto;
      background: var(--danger);
      color: white;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    /* ===== CONTENU PRINCIPAL ===== */
    .main-content {
      background: var(--bg-primary);
      border: 2px solid var(--border-color);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* Barre d'outils */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .toolbar-left, .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .btn-primary {
      background: var(--accent-color);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: var(--sidebar-bg);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: var(--border-color);
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    /* Mode sombre toggle */
    .dark-mode-toggle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--sidebar-bg);
      border: 1px solid var(--border-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
    }

    /* ===== STATISTIQUES ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .stat-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--accent-color);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
    }

    .stat-info h3 {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 5px;
    }

    .stat-info p {
      color: var(--text-primary);
      font-size: 1.8rem;
      font-weight: bold;
    }

    /* ===== RECHERCHE FILTRES ===== */
    .search-section {
      background: var(--bg-secondary);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
    }

    .search-row {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 2;
      padding: 15px 20px;
      border: 2px solid var(--border-color);
      border-radius: 15px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1rem;
    }

    .filter-select {
      flex: 1;
      padding: 15px 20px;
      border: 2px solid var(--border-color);
      border-radius: 15px;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    /* ===== TABLEAU ===== */
    .table-container {
      overflow-x: auto;
      border-radius: 20px;
      border: 2px solid var(--border-color);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: var(--accent-color);
      color: white;
      padding: 15px;
      text-align: left;
      font-weight: 600;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    tr:hover {
      background: var(--bg-secondary);
    }

    .status-badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-block;
    }

    .status-confirme {
      background: #C8E6C9;
      color: #2E7D32;
    }

    .status-urgent {
      background: #FFEBEE;
      color: var(--danger);
    }

    .status-attente {
      background: #FFF3E0;
      color: var(--warning);
    }

    .action-btn {
      background: none;
      border: none;
      color: var(--accent-color);
      cursor: pointer;
      margin: 0 5px;
      font-size: 1rem;
      padding: 8px;
      border-radius: 50%;
    }

    .action-btn:hover {
      background: var(--sidebar-bg);
    }

    /* ===== FICHE MENARA (4 PARTIES COMPLÈTES) ===== */
    .fiche-complete {
      display: flex;
      flex-direction: column;
      gap: 25px;
      margin-top: 20px;
    }

    .fiche-partie {
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: 20px;
      padding: 20px;
      position: relative;
    }

    .partie-titre {
      background: var(--accent-color);
      color: white;
      padding: 8px 20px;
      border-radius: 30px;
      display: inline-block;
      font-weight: 600;
      margin-bottom: 20px;
      font-size: 1.1rem;
    }

    .partie-titre i {
      margin-right: 8px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .form-item {
      display: flex;
      flex-direction: column;
    }

    .form-item label {
      color: var(--text-primary);
      font-weight: 600;
      margin-bottom: 5px;
      font-size: 0.9rem;
    }

    .form-item input,
    .form-item select,
    .form-item textarea {
      padding: 10px 12px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    .form-item input:focus,
    .form-item select:focus,
    .form-item textarea:focus {
      outline: none;
      border-color: var(--accent-color);
    }

    .dotted-input {
      border-bottom: 3px dotted var(--text-primary) !important;
      border-radius: 0 !important;
      border-left: none !important;
      border-right: none !important;
      border-top: none !important;
      background: transparent !important;
    }

    .form-row-horizontal {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .form-row-horizontal .form-item {
      flex: 1;
      min-width: 150px;
    }

    .checkbox-group {
      display: flex;
      gap: 30px;
      align-items: center;
      padding: 10px 0;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .recu-number {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--accent-color);
      background: var(--bg-primary);
      padding: 5px 15px;
      border-radius: 15px;
      border: 2px solid var(--accent-color);
      display: inline-block;
    }

    .signature-line {
      border-bottom: 3px solid var(--text-primary);
      width: 200px;
      height: 30px;
    }

    /* ===== DOSSIER DÉTAIL ===== */
    .dossier-detail {
      background: var(--bg-secondary);
      border-radius: 20px;
      padding: 25px;
      margin-top: 25px;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--border-color);
    }

    .patient-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .info-box {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 15px;
      padding: 15px;
    }

    .info-box label {
      color: var(--text-secondary);
      font-size: 0.85rem;
      display: block;
      margin-bottom: 5px;
    }

    .info-box p {
      color: var(--text-primary);
      font-weight: 600;
      font-size: 1.1rem;
    }

    /* ===== MODAL ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-primary);
      border-radius: 30px;
      padding: 30px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border-color);
    }

    .modal-header h3 {
      color: var(--text-primary);
    }

    .close-modal {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      color: var(--text-primary);
      font-weight: 600;
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid var(--border-color);
      border-radius: 15px;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    /* ===== MESSAGES ===== */
    .validation-message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
    }

    .success-message {
      background: var(--success);
      color: white;
    }

    .error-message {
      background: var(--danger);
      color: white;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- SIDEBAR PRINCIPALE -->
    <div class="main-sidebar">
      <div class="sidebar-header">
        <h3><i class="fas fa-hospital"></i> NéoSuite</h3>
      </div>
      
      <div class="menu-item active" onclick="showSection('fiches')">
        <i class="fas fa-file-medical"></i>
        <span>Fiches MENARA</span>
        <span class="badge" id="fichesCount">0</span>
      </div>
      
      <div class="menu-item" onclick="showSection('dossiers')">
        <i class="fas fa-folder-open"></i>
        <span>Dossiers médicaux</span>
        <span class="badge" id="dossiersCount">0</span>
      </div>
      
      <div class="menu-item" onclick="showSection('rendezvous')">
        <i class="fas fa-calendar-check"></i>
        <span>Rendez-vous</span>
        <span class="badge" id="rdvCount">0</span>
      </div>
      
      <div class="menu-item" onclick="showSection('patients')">
        <i class="fas fa-users"></i>
        <span>Patients</span>

      </div>
      
      <div class="menu-item" onclick="showSection('statistiques')">
        <i class="fas fa-chart-line"></i>
        <span>Statistiques</span>
      </div>
      
      <div style="margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--border-color);">
        <div class="dark-mode-toggle" onclick="toggleDarkMode()" style="margin: 0 auto;">
          <i class="fas fa-moon"></i>
        </div>
      </div>
    </div>

    <!-- CONTENU PRINCIPAL -->
    <div class="main-content" id="mainContent">
      <!-- Le contenu change selon la section choisie -->
    </div>
  </div>

  <!-- MODAL DOSSIER -->
  <div class="modal" id="dossierModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Nouveau dossier médical</h3>
        <button class="close-modal" onclick="closeModal('dossierModal')">&times;</button>
      </div>
      <div id="modalBody">
        <div class="form-group">
          <label>Patient</label>
          <select id="modalPatient">
            <option value="">Sélectionner un patient</option>
          </select>
        </div>
        <div class="form-group">
          <label>Médecin traitant</label>
          <input type="text" id="modalMedecin" placeholder="Nom du médecin">
        </div>
        <div class="form-group">
          <label>Date d'ouverture</label>
          <input type="text" id="modalDate" value="">
        </div>
        <div class="form-group">
          <label>Antécédents médicaux</label>
          <textarea id="modalAntecedents" rows="3" placeholder="Antécédents..."></textarea>
        </div>
        <div class="form-group">
          <label>Allergies</label>
          <input type="text" id="modalAllergies" placeholder="Allergies...">
        </div>
        <div class="form-group">
          <label>Traitements en cours</label>
          <textarea id="modalTraitements" rows="2" placeholder="Traitements..."></textarea>
        </div>
      </div>
      <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
        <button class="btn btn-secondary" onclick="closeModal('dossierModal')">Annuler</button>
        <button class="btn btn-primary" onclick="saveDossier()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- MODAL RENDEZ-VOUS -->
  <div class="modal" id="rdvModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Nouveau rendez-vous</h3>
        <button class="close-modal" onclick="closeModal('rdvModal')">&times;</button>
      </div>
      <div>
        <div class="form-group">
          <label>Patient</label>
          <select id="rdvPatient">
            <option value="">Sélectionner un patient</option>
          </select>
        </div>
        <div class="form-group">
          <label>Médecin</label>
          <select id="rdvMedecin">
            <option value="Dr. Martin">Dr. Martin</option>
            <option value="Dr. Bernard">Dr. Bernard</option>
            <option value="Dr. Lambert">Dr. Lambert</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="text" id="rdvDate" value="">
        </div>
        <div class="form-group">
          <label>Heure</label>
          <input type="text" id="rdvHeure" value="">
        </div>
        <div class="form-group">
          <label>Motif</label>
          <input type="text" id="rdvMotif" placeholder="Motif du rendez-vous">
        </div>
      </div>
      <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
        <button class="btn btn-secondary" onclick="closeModal('rdvModal')">Annuler</button>
        <button class="btn btn-primary" onclick="saveRdv()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- MODAL PATIENT -->
  <div class="modal" id="patientModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Nouveau patient</h3>
        <button class="close-modal" onclick="closeModal('patientModal')">&times;</button>

          <label>Nom</label>

        <div class="form-group">
          <label>Prénom</label>
          <input type="text" id="patientPrenom" placeholder="Prénom">
        </div>
        <div class="form-group">
          <label>Âge</label>
          <input type="number" id="patientAge" placeholder="Âge">
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="tel" id="patientTel" placeholder="Téléphone">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="patientEmail" placeholder="Email">
        </div>
        <div class="form-group">
          <label>Mutuelle</label>
          <input type="text" id="patientMutuelle" placeholder="Mutuelle">
        </div>
      </div>
      <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
        <button class="btn btn-secondary" onclick="closeModal('patientModal')">Annuler</button>
        <button class="btn btn-primary" onclick="savePatient()">Enregistrer</button>
      </div>
    </div>
  </div>

      const mainContent = document.getElementById('mainContent');
      
      switch(section) {
        case 'fiches':

          break;
        case 'dossiers':
          mainContent.innerHTML = getDossiersHTML();
          break;
        case 'rendezvous':

    function newFiche() {
      document.querySelectorAll('input, textarea').forEach(field => {
        if (field.type === 'checkbox') {
          field.checked = false;
        } else {
          field.value = '';
        }
      });
      document.getElementById('date').value = new Date().toLocaleDateString('fr-FR');
      document.getElementById('heure').value = new Date().toLocaleTimeString('fr-FR').slice(0,5);
      document.getElementById('numRecu').value = '000' + Math.floor(Math.random() * 10000);
      document.getElementById('receptionniste').value = 'Sophie Dubois';
      document.getElementById('receptionniste2').value = 'Sophie Dubois';
      document.getElementById('montantTotal').value = '0 DH';
    }

    function openDossierModal() {
      const select = document.getElementById('modalPatient');
      select.innerHTML = '<option value="">Sélectionner un patient</option>';
      patients.forEach(p => {
        select.innerHTML += `<option value="${p.prenom} ${p.nom}">${p.prenom} ${p.nom}</option>`;
      });
      document.getElementById('modalDate').value = new Date().toLocaleDateString('fr-FR');
      document.getElementById('dossierModal').classList.add('active');
    }

    function saveDossier() {
      const patient = document.getElementById('modalPatient').value;
      if (!patient) { showMessage('Sélectionnez un patient', 'error'); return; }
      
      const newDossier = {
        id: dossiers.length + 1,
        patient: patient,
        age: Math.floor(Math.random() * 50) + 20,
        medecin: document.getElementById('modalMedecin').value || 'Dr. Martin',
        dateCreation: document.getElementById('modalDate').value,
        derniereVisite: new Date().toLocaleDateString('fr-FR'),
        antecedent: document.getElementById('modalAntecedents').value || 'Aucun',
        allergies: document.getElementById('modalAllergies').value || 'Aucune',
        traitement: document.getElementById('modalTraitements').value || 'Aucun',
        statut: 'Actif',
        telephone: '06 ' + Math.floor(Math.random() * 10000000),
        email: patient.toLowerCase().replace(' ', '.') + '@email.com'
      };
      dossiers.push(newDossier);
      localStorage.setItem('dossiersMedicaux', JSON.stringify(dossiers));
      closeModal('dossierModal');
      showSection('dossiers');
      updateAllCounts();
      showMessage('✅ Dossier créé', 'success');
    }

        patient: patient,
        medecin: document.getElementById('rdvMedecin').value,
        date: document.getElementById('rdvDate').value,
        heure: document.getElementById('rdvHeure').value,
        motif: document.getElementById('rdvMotif').value || 'Consultation',
        statut: 'Confirmé'
      };
      rendezvous.push(newRdv);
      localStorage.setItem('rendezvous', JSON.stringify(rendezvous));
      closeModal('rdvModal');
      showSection('rendezvous');
      updateAllCounts();
      showMessage('✅ Rendez-vous créé', 'success');
    }

    function openPatientModal() {
      document.getElementById('patientModal').classList.add('active');
    }

    function savePatient() {
      const newPatient = {
        id: patients.length + 1,
        nom: document.getElementById('patientNom').value,
        prenom: document.getElementById('patientPrenom').value,
        age: document.getElementById('patientAge').value,
        telephone: document.getElementById('patientTel').value,
        email: document.getElementById('patientEmail').value,
        mutuelle: document.getElementById('patientMutuelle').value || 'Aucune'
      };
      patients.push(newPatient);
      localStorage.setItem('patients', JSON.stringify(patients));
      closeModal('patientModal');
      showSection('patients');
      updateAllCounts();
      showMessage('✅ Patient ajouté', 'success');
    }

    function viewDossier(id) {
      selectedDossier = dossiers.find(d => d.id === id);
      showSection('dossiers');
    }

    function deleteDossier(id) {
      if (confirm('Supprimer ce dossier ?')) {
        dossiers = dossiers.filter(d => d.id !== id);
        localStorage.setItem('dossiersMedicaux', JSON.stringify(dossiers));
        if (selectedDossier?.id === id) selectedDossier = null;
        showSection('dossiers');
        updateAllCounts();
        showMessage('✅ Dossier supprimé', 'success');
      }
    }

    function deleteRdv(id) {
      if (confirm('Supprimer ce rendez-vous ?')) {
        rendezvous = rendezvous.filter(r => r.id !== id);
        localStorage.setItem('rendezvous', JSON.stringify(rendezvous));
        showSection('rendezvous');
        updateAllCounts();
        showMessage('✅ Rendez-vous supprimé', 'success');
      }
    }

    function deletePatient(id) {
      if (confirm('Supprimer ce patient ?')) {
        patients = patients.filter(p => p.id !== id);
        localStorage.setItem('patients', JSON.stringify(patients));
        showSection('patients');
        updateAllCounts();
        showMessage('✅ Patient supprimé', 'success');
      }
    }

    function confirmRdv(id) {
      const rdv = rendezvous.find(r => r.id === id);
      if (rdv) {
        rdv.statut = 'Confirmé';
        localStorage.setItem('rendezvous', JSON.stringify(rendezvous));
        showSection('rendezvous');
        showMessage('✅ Rendez-vous confirmé', 'success');
      }
    }

    function callPatient(tel) {
      window.location.href = `tel:${tel}`;
    }

    function closeDetail() {
      selectedDossier = null;
      showSection('dossiers');
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('active');
    }

    // ========== PDF ==========
    function generatePDF() {
      const element = document.querySelector('.main-content');
      const opt = {
        margin:       1,
        filename:     `fiche_menara_${Date.now()}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2 },
        jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
      };
      html2pdf().set(opt).from(element).save();
    }

    // ========== MODE SOMBRE ==========
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const icon = document.querySelector('.dark-mode-toggle i');
      icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
    }

    // ========== MESSAGES ==========
    function showMessage(text, type) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `validation-message ${type}-message`;
      msgDiv.textContent = text;
      document.getElementById('mainContent').appendChild(msgDiv);
      setTimeout(() => msgDiv.remove(), 3000);
    }
  </script>
</body>
</html>
